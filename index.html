<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #F1EEE7;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
  padding-bottom: 2vh;
}

.logo-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  animation: fadeIn 1s cubic-bezier(0.25, 0.1, 0.25, 1) 0.1s forwards;
}

.logo {
  width: clamp(240px, 34vw, 480px);
  height: auto;
  display: block;
}

.divider {
  width: 40px;
  height: 0.5px;
  background: #A89880;
  margin: clamp(28px, 4vh, 48px) auto;
  opacity: 0;
  animation: dividerIn 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.6s forwards;
}

.tagline-main {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: clamp(9.5px, 0.78vw, 12px);
  letter-spacing: 0.44em;
  text-transform: uppercase;
  color: #4A3F35;
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.9s forwards;
}

footer {
  padding: 2rem 2rem 2.4rem;
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) 1.2s forwards;
}

footer a {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #6B5C4E;
  text-decoration: none;
  transition: color 0.3s ease;
}

footer a:hover {
  color: #2C2018;
}

.footer-dot {
  display: inline-block;
  width: 2.5px;
  height: 2.5px;
  border-radius: 50%;
  background: #A89880;
  vertical-align: middle;
  margin: 0 1.4rem;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes dividerIn {
  from { opacity: 0; width: 0; }
  to   { opacity: 1; width: 40px; }
}

@media (max-width: 600px) {
  .logo {
    width: clamp(200px, 60vw, 300px);
  }
  .tagline-main {
    font-size: 9px;
    letter-spacing: 0.36em;
    padding: 0 20px;
  }
  footer a {
    font-size: 9px;
    letter-spacing: 0.22em;
  }
  .footer-dot {
    margin: 0 1rem;
  }
}
</style>
